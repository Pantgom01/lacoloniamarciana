<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Colonia Marciana · micro:bit</title>

  <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
  <div class="container">

    <!-- HERO -->
    <section class="panel hero">
      <div>
        <div class="badge">🚀 <span>Gamificación · micro:bit + IoT:bit + MakeCode</span></div>
        <h1>La Colonia Marciana</h1>
        <p class="lead">
          Durante la noche marciana, varios sistemas de la base han fallado...
        </p>

        <div class="stats">
          <div class="panel-dark stat"><div class="label">Misiones</div><div class="value">8</div></div>
          <div class="panel-dark stat"><div class="label">Tecnología</div><div class="value">micro:bit + IoT:bit</div></div>
          <div class="panel-dark stat"><div class="label">Programación</div><div class="value">MakeCode</div></div>
        </div>
      </div>
    </section>

    <!-- MISIONES -->
    <section class="panel section">
      <div class="section-header">
        <h2>Misiones</h2>
        <button id="reset-btn" class="btn">Reiniciar</button>
      </div>
      <div id="mission-grid" class="mission-grid"></div>
    </section>

    <!-- MISION DETALLE -->
    <section class="main-grid">
      <article id="mission-card" class="panel"></article>

      <aside class="panel side-panel">
        <h3>Panel del comandante</h3>

        <select id="team-select"></select>

        <div id="selected-mission-title"></div>
        <div id="selected-mission-points"></div>

        <input id="code-input" placeholder="Clave misión" />

        <button id="validate-btn" class="btn btn-primary">
          Validar
        </button>

        <div id="unlock-message"></div>
      </aside>
    </section>

    <!-- TABLERO -->
    <section class="panel section">
      <h2>Tablero</h2>
      <div id="board-grid"></div>
    </section>

  </div>

  <script src="./js/app.js"></script>
</body>
</html>
